# Group members used by the weekly publication auto-update
# (.github/workflows/update-publications.yml → scripts/fetch_new_papers.py).
#
# ORCID iDs verified against the ORCID registry (affiliation + listed works)
# on 2026-07-06. `since` bounds the arXiv search for member-led papers:
# only papers published on/after this date are auto-added.
# Removing a member stops future auto-adds (already-added entries stay until
# the curated ADS library replaces or removes them).
#
# name_variants: forms that may appear as the arXiv first-author name.

pi:
